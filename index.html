<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTEL: CAYO PERICO ADVANCED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --border: #222222;
            --text: #ffffff;
            --text-dim: #555555;
            --error: #ff0000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            padding: 15px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        header { border-bottom: 2px solid var(--text); padding-bottom: 10px; margin-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 15px; }
        @media (max-width: 950px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; position: relative; }
        .card-header { font-size: 10px; color: var(--text-dim); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 5px; display: block; }

        select, input[type="number"] {
            width: 100%; padding: 10px; background: #000; border: 1px solid var(--border);
            color: var(--text); font-family: 'Space Mono', monospace; outline: none; box-sizing: border-box;
        }

        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn-tgl {
            flex: 1; padding: 8px; background: #111; border: 1px solid var(--border);
            color: var(--text-dim); cursor: pointer; font-family: 'Space Mono', monospace; font-size: 9px;
        }
        .btn-tgl.active { background: #fff; color: #000; border-color: #fff; }

        .loot-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #111; }
        .btn-count { width: 28px; height: 28px; background: #000; border: 1px solid var(--border); color: #fff; cursor: pointer; }

        .map-wrapper { position: relative; border: 1px solid var(--border); background: #000; line-height: 0; }
        .map-img { width: 100%; height: auto; display: block; filter: grayscale(1); }
        
        .hotspot { position: absolute; cursor: pointer; border: 1px dashed rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); transition: 0.2s; }
        .hotspot.active { background: rgba(255,255,255,0.3); border: 2px solid #fff; box-shadow: 0 0 10px #fff; }

        .breakdown { margin-top: 15px; font-size: 10px; color: var(--text-dim); }
        .breakdown-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .val-white { color: #fff; }

        .player-box { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #050505; border: 1px solid var(--border); margin-bottom: 8px; }
        .player-take { font-size: 1.2rem; font-weight: bold; }

        .footer-summary { border: 2px solid var(--text); padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .bag-meter { height: 8px; background: #111; margin-top: 10px; border: 1px solid var(--border); }
        .bag-fill { height: 100%; background: #fff; width: 0%; transition: 0.4s; }
        .bag-fill.overflow { background: var(--error); }
        .warning-text { color: var(--error); font-size: 10px; font-weight: bold; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>SYSTEM: CAYO_TACTICAL</h1></header>

    <div class="grid">
        <!-- Setup Column -->
        <div class="card">
            <span class="card-header">01_PRIMARY_OBJECTIVE</span>
            <select id="primary" onchange="calculate()">
                <option value="630000">Sinsimito Tequila</option>
                <option value="700000">Ruby Necklace</option>
                <option value="770000">Bearer Bonds</option>
                <option value="1100000">Madrazo Files</option>
                <option value="1300000" selected>Pink Diamond</option>
                <option value="1900000">Panther Statue</option>
            </select>

            <div style="display:flex; gap:5px; margin: 15px 0;">
                <button id="hardBtn" class="btn-tgl" onclick="toggleHard()">HARD_MODE (+10%)</button>
                <button id="eliteBtn" class="btn-tgl active" onclick="toggleElite()">ELITE</button>
            </div>

            <span class="card-header">02_SECONDARY_LOOT_INPUT</span>
            <div class="loot-row"><span>Cocaine (50%)</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-count" onclick="changeLoot('coke', -1)">-</button>
                    <span id="coke-val">0</span>
                    <button class="btn-count" onclick="changeLoot('coke', 1)">+</button>
                </div>
            </div>
            <div class="loot-row"><span>Weed (37.5%)</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-count" onclick="changeLoot('weed', -1)">-</button>
                    <span id="weed-val">0</span>
                    <button class="btn-count" onclick="changeLoot('weed', 1)">+</button>
                </div>
            </div>
            <div class="loot-row"><span>Paint (50%)</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="btn-count" onclick="changeLoot('paint', -1)">-</button>
                    <span id="paint-val">0</span>
                    <button class="btn-count" onclick="changeLoot('paint', 1)">+</button>
                </div>
            </div>
            <div class="loot-row"><span>Wall Safe ($)</span>
                <input type="number" id="wallSafe" value="75000" onchange="calculate()" style="width: 100px; text-align: right; border: 1px solid var(--border); background: #000; color: var(--text); font-family: 'Space Mono'; padding: 5px;">
            </div>

            <div class="breakdown" id="loot-breakdown"></div>

            <div style="margin-top:20px;">
                <span class="card-header">TOTAL_BAG_USAGE: <span id="bag-pct">0%</span></span>
                <div class="bag-meter"><div id="bag-fill" class="bag-fill"></div></div>
                <div id="overflow-msg" class="warning-text">!! CAPACITY_EXCEEDED !!</div>
            </div>
        </div>

        <!-- Map Column -->
        <div class="card">
            <span class="card-header">03_COMPOUND_GOLD_LOCATIONS</span>
            <div class="map-wrapper">
                <img src="map.png" class="map-img">
                <div id="room-north" class="hotspot" style="top: 43%; left: 49%; width: 7%; height: 7%;" onclick="toggleRoom('room-north')"></div>
                <div id="room-west" class="hotspot" style="top: 48%; left: 28%; width: 7%; height: 7%;" onclick="toggleRoom('room-west')"></div>
                <div id="room-south" class="hotspot" style="top: 68%; left: 38%; width: 7%; height: 7%;" onclick="toggleRoom('room-south')"></div>
                <div id="room-east" class="hotspot" style="top: 50%; left: 79%; width: 7%; height: 7%;" onclick="toggleRoom('room-east')"></div>
                <div id="room-office-small" class="hotspot" style="top: 51%; left: 39%; width: 5%; height: 5%;" onclick="toggleRoom('room-office-small')"></div>
            </div>

            <div style="margin-top:20px;">
                <span class="card-header">04_TEAM_PAYOUT_DISTRIBUTION</span>
                <div id="player-list"></div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-tgl" onclick="addPlayer()">+ ADD_OPERATIVE</button>
                    <button class="btn-tgl" onclick="removePlayer()">- REMOVE</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-summary">
        <div>
            <span style="font-size:10px; color:var(--text-dim);">NET_OPERATIVE_TAKE</span>
            <div id="total-net" style="font-size:1.8rem; font-weight:bold;">$0</div>
        </div>
        <div style="text-align:right">
            <span style="font-size:10px; color:var(--text-dim);">FEES_TOTAL (12%)</span>
            <div id="total-fees" style="font-size:1rem;">$0</div>
        </div>
    </div>
</div>

<script>
    let players = [85, 15];
    let isHard = false, isElite = true, goldCount = 0;
    let loot = { coke: 0, weed: 0, paint: 0 };

    function changeLoot(type, amt) {
        loot[type] = Math.max(0, loot[type] + amt);
        document.getElementById(type + '-val').innerText = loot[type];
        calculate();
    }

    function toggleHard() { isHard = !isHard; document.getElementById('hardBtn').classList.toggle('active'); calculate(); }
    function toggleElite() { isElite = !isElite; document.getElementById('eliteBtn').classList.toggle('active'); calculate(); }
    function toggleRoom(id) { document.getElementById(id).classList.toggle('active'); goldCount = document.querySelectorAll('.hotspot.active').length; calculate(); }
    
    function addPlayer() { 
        if(players.length < 4) { 
            players.push(0); 
            calculate(); 
        } 
    }
    
    function removePlayer() { 
        if(players.length > 1) { 
            players.pop(); 
            calculate(); 
        } 
    }

    function updateCut(i, val) { 
        let num = parseInt(val);
        if (isNaN(num) || num < 0) num = 0;
        if (num > 100) num = 100;
        players[i] = num; 
        calculate(); 
    }

    function calculate() {
        const basePrimary = parseInt(document.getElementById('primary').value);
        const valPrimary = basePrimary * (isHard ? 1.1 : 1);
        const valGold = goldCount * 332000;
        const valCoke = loot.coke * 220000;
        const valPaint = loot.paint * 189000;
        const valWeed = loot.weed * 147000;
        const valSafe = parseInt(document.getElementById('wallSafe').value) || 0;

        const weight = (goldCount * 0.666) + (loot.coke * 0.5) + (loot.paint * 0.5) + (loot.weed * 0.375);
        const weightPct = (weight / players.length) * 100;

        const fill = document.getElementById('bag-fill');
        const overflowMsg = document.getElementById('overflow-msg');
        fill.style.width = Math.min(weightPct, 100) + "%";
        if (weightPct > 100) { fill.classList.add('overflow'); overflowMsg.style.display = 'block'; } 
        else { fill.classList.remove('overflow'); overflowMsg.style.display = 'none'; }
        document.getElementById('bag-pct').innerText = Math.floor(weightPct) + "%";

        const breakdown = document.getElementById('loot-breakdown');
        const primaryLabel = isHard ? "PRIMARY (+10% HARD):" : "PRIMARY TARGET:";
        breakdown.innerHTML = `
            <div class="breakdown-item"><span>${primaryLabel}</span> <span class="val-white">$${valPrimary.toLocaleString()}</span></div>
            ${goldCount > 0 ? `<div class="breakdown-item"><span>GOLD (x${goldCount}):</span> <span class="val-white">$${valGold.toLocaleString()}</span></div>` : ''}
            ${loot.coke > 0 ? `<div class="breakdown-item"><span>COCAINE (x${loot.coke}):</span> <span class="val-white">$${valCoke.toLocaleString()}</span></div>` : ''}
            ${loot.paint > 0 ? `<div class="breakdown-item"><span>PAINT (x${loot.paint}):</span> <span class="val-white">$${valPaint.toLocaleString()}</span></div>` : ''}
            ${loot.weed > 0 ? `<div class="breakdown-item"><span>WEED (x${loot.weed}):</span> <span class="val-white">$${valWeed.toLocaleString()}</span></div>` : ''}
            <div class="breakdown-item"><span>WALL_SAFE:</span> <span class="val-white">$${valSafe.toLocaleString()}</span></div>
        `;

        const gross = valPrimary + valGold + valCoke + valPaint + valWeed + valSafe;
        const fees = gross * 0.12;
        const eliteBonus = isElite ? (isHard ? 100000 : 50000) : 0;
        const net = (gross - fees) + (eliteBonus * players.length);

        document.getElementById('total-net').innerText = `$${Math.floor(net).toLocaleString()}`;
        document.getElementById('total-fees').innerText = `-$${Math.floor(fees).toLocaleString()}`;

        const list = document.getElementById('player-list');
        list.innerHTML = '';
        players.forEach((cut, i) => {
            const take = net * (cut/100);
            list.innerHTML += `<div class="player-box">
                <div><div style="font-size:9px; color:var(--text-dim);">OPERATIVE_0${i+1}</div><div class="player-take">$${Math.floor(take).toLocaleString()}</div></div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="number" value="${cut}" onchange="updateCut(${i}, this.value)" style="width:60px; text-align:center; background:#000; border:1px solid #333; color:#fff; font-family:'Space Mono'; padding:5px;">
                    <span>%</span>
                </div>
            </div>`;
        });
    }
    calculate();
</script>

</body>
</html>
